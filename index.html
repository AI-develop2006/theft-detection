<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraGuard AI | Energy Audit Portal</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --danger: #ef4444;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-top: 85px;
            transition: background 0.5s ease;
        }

        /* --- NAVIGATION BAR --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, #059669 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.25);
        }

        .nav-links {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 600;
            transition: 0.2s;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--primary);
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-left: 24px;
            border-left: 1px solid var(--border);
            cursor: pointer;
            text-decoration: none;
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #dbeafe 0%, #d1fae5 100%);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            border: 2px solid var(--border);
        }

        /* --- DASHBOARD LAYOUT --- */
        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            margin: 0 0 8px 0;
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .page-header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 16px;
        }

        .card {
            background: var(--card-bg);
            padding: 48px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 22px;
            letter-spacing: -0.5px;
            font-weight: 700;
        }

        .card-subtitle {
            color: var(--text-muted);
            margin: 0 0 32px 0;
            font-size: 15px;
        }

        .label-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        label {
            font-weight: 700;
            color: var(--text-main);
            font-size: 14px;
        }

        .badge-value {
            background: var(--primary);
            color: white;
            padding: 4px 14px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 800;
        }

        input[type="number"] {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            margin-bottom: 28px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: #f8fafc;
            font-size: 16px;
            transition: 0.3s;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        .btn-primary {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* --- RESULTS PANEL --- */
        .result-panel {
            margin-top: 32px;
            padding: 32px;
            border-radius: 16px;
            display: none;
            text-align: center;
            color: white;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .logout-btn {
            color: var(--danger);
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
        }

        .logout-btn:hover {
            color: #dc2626;
        }

        input[type="range"] {
            accent-color: var(--primary);
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <nav>
        <a href="#" class="logo">
            <div class="logo-icon">⚡</div>
            <span>AuraGuard AI</span>
        </a>
        <div class="nav-links">
            <a href="audit.html" class="active">Audit Tool</a>
            <a href="history.html">History</a>
            <a href="map.html">Network Map</a>
            <a href="profile.html" class="profile-section">
                <span id="staffNameDisplay"
                    style="font-size: 14px; font-weight: 600; color: var(--text-main);">Loading...</span>
                <div class="avatar" id="avatarInitials">??</div>
            </a>
            <a href="login.html" class="logout-btn">Logout</a>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="page-header">
            <h1>Field Audit Dashboard</h1>
            <p>AI-powered theft detection for electricity bill collectors</p>
        </div>

        <section class="card">
            <h2>Security Intelligence Audit</h2>
            <p class="card-subtitle">
                Enter field measurements to run AI theft detection.
            </p>

            <label>Avg. Monthly Consumption (kWh)</label>
            <input type="number" id="avg_current" placeholder="Enter consumption value">

            <div class="label-container">
                <label>House Profile (1-5)</label>
                <span id="houseSizeValue" class="badge-value">1</span>
            </div>
            <input type="range" id="house_size" min="1" max="5" value="1"
                oninput="document.getElementById('houseSizeValue').innerText = this.value"
                style="width: 100%; margin-bottom: 12px;">

            <div class="range-labels">
                <span>SMALL UNIT</span>
                <span>MEDIUM</span>
                <span>LARGE ESTATE</span>
            </div>

            <label>Inactive Days (Zero Load)</label>
            <input type="number" id="zero_days" placeholder="Days without usage">

            <button class="btn-primary" id="runBtn">Check Risk</button>

            <div id="result" class="result-panel">
                <span class="status-badge">AI ANALYSIS COMPLETE</span>
                <h3 id="status" style="margin: 0; font-size: 28px;"></h3>
                <p id="score" style="margin: 12px 0 0 0; font-size: 17px; opacity: 0.95;"></p>
            </div>
        </section>
    </main>

    <script>
        window.onload = () => {
            const fullName = localStorage.getItem('staffName') || "Field Auditor";
            document.getElementById('staffNameDisplay').innerText = fullName;
            const initials = fullName.split(" ").map(n => n[0]).join("").toUpperCase();
            document.getElementById('avatarInitials').innerText = initials.substring(0, 2);
        };

        document.getElementById('runBtn').onclick = async () => {
            const btn = document.getElementById('runBtn');
            const data = {
                avg_current: parseFloat(document.getElementById('avg_current').value) || 0,
                house_size: parseInt(document.getElementById('house_size').value),
                zero_days: parseInt(document.getElementById('zero_days').value) || 0
            };

            btn.innerText = "PROCESSING DATA...";
            btn.disabled = true;

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const res = await response.json();

                const box = document.getElementById('result');
                const body = document.body;
                const score = res.risk_score;

                box.style.display = 'block';

                // THEMES LOGIC
                if (score < 50) {
                    body.style.background = "#dcfce7";
                    box.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                } else if (score >= 50 && score <= 80) {
                    body.style.background = "#fef9c3";
                    box.style.background = 'linear-gradient(135deg, #facc15, #ca8a04)';
                } else {
                    body.style.background = "#fee2e2";
                    box.style.background = 'linear-gradient(135deg, #ef4444, #b91d1d)';
                }

                document.getElementById('status').innerText = res.status;
                document.getElementById('score').innerText = "Risk Confidence: " + score + "%";

            } catch (e) {
                alert("Error: Connection to AI Engine lost.");
            } finally {
                btn.innerText = "Check Risk";
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
