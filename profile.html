<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraGuard AI | Staff Profile</title>
    <style>
        :root { 
            --primary: #10b981; 
            --primary-hover: #059669;
            --bg: #f8fafc; 
            --border: #e2e8f0; 
            --text-main: #0f172a;
            --text-muted: #64748b;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f0fdf4 0%, #e0f2fe 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
        }

        .profile-card {
            background: white; 
            width: 100%; 
            max-width: 480px; 
            border-radius: 24px; 
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1); 
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        .header { 
            background: linear-gradient(135deg, var(--primary) 0%, #059669 100%); 
            height: 120px; 
            position: relative;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .avatar-large {
            width: 110px; 
            height: 110px; 
            background: linear-gradient(135deg, #dbeafe 0%, #d1fae5 100%); 
            border-radius: 50%;
            position: absolute; 
            bottom: -55px; 
            left: 50%; 
            transform: translateX(-50%);
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 36px; 
            font-weight: 900; 
            color: var(--primary);
            border: 5px solid white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .content { 
            padding: 70px 40px 40px 40px; 
            text-align: center; 
        }

        .content h2 {
            margin: 0 0 4px 0; 
            color: var(--text-main);
            font-size: 28px;
            font-weight: 800;
        }

        .role-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f0fdf4 0%, #dbeafe 100%);
            color: var(--primary); 
            font-weight: 700; 
            font-size: 12px; 
            padding: 6px 16px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #d1fae5;
            letter-spacing: 0.5px;
        }

        .details-container {
            margin-top: 36px;
            background: #f8fafc;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .detail-row {
            display: flex; 
            justify-content: space-between; 
            padding: 14px 0;
            border-bottom: 1px solid var(--border); 
            font-size: 15px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .label { 
            color: var(--text-muted); 
            font-weight: 600; 
            font-size: 13px;
        }

        .val { 
            font-weight: 700; 
            color: var(--text-main); 
        }

        .btn-back {
            display: block; 
            margin-top: 28px; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--primary) 0%, #059669 100%);
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 700;
            transition: all 0.3s;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-back:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-back:active {
            transform: translateY(0);
        }

        .info-note {
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
            padding: 12px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header">
            <div class="avatar-large" id="bigInitials">??</div>
        </div>
        <div class="content">
            <h2 id="pName">Loading...</h2>
            <div class="role-badge" id="pRole">OFFICIAL COLLECTOR</div>
            
            <div class="details-container">
                <div class="detail-row">
                    <span class="label">Staff Username</span>
                    <span class="val" id="pUser">---</span>
                </div>
                <div class="detail-row">
                    <span class="label">Region</span>
                    <span class="val" id="pPlace">---</span>
                </div>
                <div class="detail-row">
                    <span class="label">Contact</span>
                    <span class="val" id="pMobile">---</span>
                </div>
                <div class="detail-row">
                    <span class="label">Birth Date</span>
                    <span class="val" id="pDob">---</span>
                </div>
            </div>

            <a href="index.html" class="btn-back">BACK TO AUDIT TOOL</a>

            <div class="info-note">
                <strong>Secure Profile:</strong> Your information is encrypted and stored locally for session management.
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            // Retrieve integrated data from localStorage
            const name = localStorage.getItem('staffName');
            const user = localStorage.getItem('staffUser');
            const place = localStorage.getItem('staffPlace');
            const mobile = localStorage.getItem('staffMobile');
            const dob = localStorage.getItem('staffDob');

            if (!name) {
                // If no session data, redirect back to login
                window.location.href = 'login.html';
                return;
            }

            // Update UI elements
            document.getElementById('pName').innerText = name;
            document.getElementById('pUser').innerText = "@" + user;
            document.getElementById('pPlace').innerText = place;
            document.getElementById('pMobile').innerText = mobile;
            document.getElementById('pDob').innerText = dob;
            
            // Set Avatar Initials
            const initials = name.split(" ").map(n => n[0]).join("").toUpperCase();
            document.getElementById('bigInitials').innerText = initials.substring(0, 2);
        };
    </script>
</body>
</html>
